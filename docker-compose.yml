services:
  clayde:
    image: ghcr.io/claydecode/me:main
    restart: unless-stopped
    environment:
      - CLAYDE_ENABLED=true
    volumes:
      - ./data:/data
      # Mount Claude CLI OAuth credentials (required when CLAYDE_CLAUDE_BACKEND=cli)
      - ./data/claude-credentials.json:/root/.claude/.credentials.json
